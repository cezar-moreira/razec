<!DOCTYPE html>
<html lang="pt-BR">

  <title>RAZEC</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    h1 { font-size: 3rem; letter-spacing: 0.3rem; color: #00e5ff; }
    p { margin-top: 1rem; color: #aaa; font-size: 1.1rem; }
    nav { margin-top: 2rem; display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    nav a {
      color: #00e5ff;
      text-decoration: none;
      border: 1px solid #00e5ff;
      padding: 0.5rem 1.2rem;
      border-radius: 4px;
      transition: background 0.2s;
    }
    nav a:hover { background: #00e5ff22; }
  </style>
</head>

  <p>Central de projetos e conhecimento</p>
  <nav>
